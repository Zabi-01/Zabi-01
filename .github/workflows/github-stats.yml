name: Generate Stats Images
on:
  schedule:
    - cron: "0 0 * * *"   # once a day
  workflow_dispatch:       # allows manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout github-stats generator source
        uses: actions/checkout@v4
        with:
          repository: jstrieb/github-stats
          path: github-stats-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: github-stats-src/requirements.txt

      - name: Install dependencies
        working-directory: github-stats-src
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate images
        working-directory: github-stats-src
        run: python3 generate_images.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          EXCLUDE_FORKED_REPOS: true

      - name: Copy generated images into this repo
        run: |
          mkdir -p generated
          cp github-stats-src/generated/*.svg generated/

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add generated/*
          git commit -m "Update generated stats" || echo "No changes to commit"
          git push

name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 2,7,12,19 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Zabi-01
      - name: Commit and push to output-3d branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f profile-3d-contrib/*.svg
          git commit -m "docs: update 3D contribution graph" || echo "No changes to commit"
          git push origin HEAD:output-3d --force
